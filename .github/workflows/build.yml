name: Build snmpwalk Static Binary

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'net-snmp version (e.g., v5.9.5.2)'
        required: true
        default: 'v5.9.5.2'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: snmpwalk-static:latest
          load: true
          build-args: |
            NET_SNMP_VERSION=${{ github.event.inputs.version || github.ref_name || 'v5.9.5.2' }}

      - name: Extract binary
        run: |
          docker run --rm --entrypoint /bin/cat snmpwalk-static:latest /snmpwalk > snmpwalk

      - name: Verify binary
        run: |
          # Check if file exists
          ls -la snmpwalk
          file snmpwalk
          
          # For static binaries, ldd shows "Not a valid dynamic program" which is expected
          # Just verify the binary is marked as "statically linked" in the file output
          if file snmpwalk | grep -q "statically linked"; then
            echo "Binary is statically linked - OK"
          else
            echo "Binary may not be fully static"
            exit 1
          fi

      - name: Test binary execution
        run: |
          docker run --rm snmpwalk-static:latest -h 2>&1 | head -5

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: snmpwalk-static
          path: snmpwalk
          retention-days: 30

