name: Build snmpwalk Static Binary

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: snmpwalk-static:latest
          load: true
          build-args: |
            NET_SNMP_VERSION=${{ github.ref_name }}

      - name: Extract binary
        run: |
          docker run --rm --entrypoint /bin/cat snmpwalk-static:latest /snmpwalk > snmpwalk

      - name: Verify binary
        run: |
          # Check if file exists and is executable
          ls -la snmpwalk
          file snmpwalk
          
          # Test running the binary
          docker run --rm -v ${{ github.workspace }}/snmpwalk:/snmpwalk alpine:3.19 sh -c "apk add --no-cache file && ldd /snmpwalk"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: snmpwalk-static
          path: snmpwalk
          retention-days: 30

